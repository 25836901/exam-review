<!DOCTYPE html>

            align-items: center;

        }
        .option-item:hover {
            background: #eff6ee;
            border-color: #86b37b;
            transform: translateX(4px);
        }
        .option-prefix {
            font-weight: 800;
            background: #eef2f5;
            width: 32px;
            height: 32px;

            justify-content: center;
            border-radius: 50%;

            border-left-color: #2c8c4a;
            color: #145c2e;
        }
        .wrong-feedback {

            border-left-color: #cf4444;
            color: #aa2e2e;

            background: #2c7a4a;
            border: none;
            width: 100%;
            padding: 0.8rem;
            font-weight: 700;
            color: white;
            border-radius: 60px;

            margin-top: 0.5rem;

            background: #1f623b;

</head>

</div>

// 题库一共150题（已涵盖三个文件的主要单选题，确保答案正确）
// --------------------------------------------------------------
let currentIndex = 0;
let answered = false;
let totalQuestions = QUESTIONS.length;

const questionTextEl = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const feedbackArea = document.getElementById('feedbackArea');
const nextBtn = document.getElementById('nextBtn');
const restartBtn = document.getElementById('restartBtn');
const questionCounterSpan = document.getElementById('questionCounter');
const progressTextSpan = document.getElementById('progressText');

function updateCounter() {
    questionCounterSpan.innerText = `第${currentIndex+1} / ${totalQuestions}题`;
    progressTextSpan.innerText = `📚 已完成 ${currentIndex} / ${totalQuestions}`;
}

function renderCurrentQuestion() {
    answered = false;
    feedbackArea.style.display = 'none';
    nextBtn.style.display = 'none';
    const q = QUESTIONS[currentIndex];
    if (!q) return;
    questionTextEl.innerText = `${currentIndex+1}. ${q.text}`;
    const letters = ['A','B','C','D'];
    let html = '';
    q.options.forEach((opt, idx) => {
        html += `<div class="option-item" data-opt-value="${letters[idx]}">
                    <span class="option-prefix">${letters[idx]}</span>
                    <span>${opt}</span>
                 </div>`;
    });
    optionsContainer.innerHTML = html;
    document.querySelectorAll('.option-item').forEach(el => {
        el.addEventListener('click', (e) => {
            if (answered) return;
            const chosen = el.getAttribute('data-opt-value');
            handleAnswer(chosen, q);
        });
    });
    updateCounter();
}

function handleAnswer(chosen, q) {
    if (answered) return;
    const isCorrect = (chosen === q.answer);
    answered = true;
    feedbackArea.style.display = 'block';
    const correctLetter = q.answer;
    const correctText = getOptionText(q, correctLetter);
    if (isCorrect) {
        feedbackArea.className = 'feedback-area correct-feedback';
        feedbackArea.innerHTML = `✅ 正确！ ${q.explanation || ''}`;
        setTimeout(() => goToNextQuestion(), 550);
    } else {
        feedbackArea.className = 'feedback-area wrong-feedback';
        const chosenText = getOptionText(q, chosen);
        feedbackArea.innerHTML = `❌ 错误！ 您的选项：${chosen}. ${chosenText}<br>✔ 正确答案：${correctLetter}. ${correctText}<br>📘 解析：${q.explanation || '请复习'}`;
        nextBtn.style.display = 'block';
    }
    document.querySelectorAll('.option-item').forEach(el => {
        el.style.opacity = '0.6';
        el.style.pointerEvents = 'none';
    });
}

function getOptionText(q, letter) {
    const map = {A:0,B:1,C:2,D:3};
    const idx = map[letter];
    return q.options[idx] || '';
}

function goToNextQuestion() {
    if (currentIndex + 1 < totalQuestions) {
        currentIndex++;
        renderCurrentQuestion();
        document.querySelectorAll('.option-item').forEach(el => {
            el.style.opacity = '1';
            el.style.pointerEvents = 'auto';
        });
    } else {
        feedbackArea.style.display = 'block';
        feedbackArea.className = 'feedback-area correct-feedback';
        feedbackArea.innerHTML = '🎉 恭喜！您已完成全部题目！ 🎉<br>点击「重新开始」继续复习。';
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '<div style="text-align:center;padding:2rem;">✨ 完美通关 ✨</div>';
        questionTextEl.innerText = '复习完成！您已精通考点~';
    }
}

function resetQuiz() {
    currentIndex = 0;
    answered = false;
    renderCurrentQuestion();
    nextBtn.style.display = 'none';
    document.querySelectorAll('.option-item')?.forEach(el => {
        if(el) { el.style.opacity = '1'; el.style.pointerEvents = 'auto'; }
    });
    feedbackArea.style.display = 'none';
}

nextBtn.addEventListener('click', goToNextQuestion);
restartBtn.addEventListener('click', resetQuiz);
renderCurrentQuestion();
</script>
</body>
</html>
