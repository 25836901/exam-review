let currentModule = 'skill';
let questions = [];

const progressSpan = document.getElementById('progress');

const nextBtn = document.getElementById('nextBtn');

function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function shuffleOptions(q) { if (q.answer.length > 1) return q; const opts = [...q.options]; let indices = [0,1,2,3]; for (let i = indices.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [indices[i],indices[j]]=[indices[j],indices[i]]; } const newOpts = indices.map(i=>opts[i]); const oldIdx = q.answer.charCodeAt(0)-65; const newIdx = indices.indexOf(oldIdx); const newAns = String.fromCharCode(65+newIdx); return {...q, options:newOpts, answer:newAns}; }
function loadModule(module, shuffleOrder=true) { let raw; if(module==='skill') raw=[...SKILL]; else if(module==='theory_single') raw=[...SINGLE]; else if(module==='theory_multi') raw=[...MULTI]; else raw=[...JUDGE]; if(shuffleOrder) raw=shuffleArray(raw); let processed = raw.map(q=>{ if(module!=='theory_multi') return shuffleOptions(q); else return {...q}; }); questions=processed; currentIndex=0; answered=false; renderQuestion(); }

dbackDiv.innerHTML=''; nextBtn.style.display='none'; answered=false; progressSpan.innerText=`第${currentIndex+1}/${questions.length}题`; }

function resetModule(){ loadModule(currentModule, true); }
