function loadModule(module, shuffleOrder=true) { let raw; if(module==='skill') raw=[...SKILL]; else if(module==='theory_single') raw=[...SINGLE]; else if(module==='theory_multi') raw=[...MULTI]; else raw=[...JUDGE]; if(shuffleOrder) raw=shuffleArray(raw); let processed = raw.map(q=>{ if(module!=='theory_multi') return shuffleOptions(q); else return {...q}; }); questions=processed; currentIndex=0; answered=false; renderQuestion(); }
function renderQuestion() { if(!questions.length){ questionTextDiv.innerText='暂无题目'; optionsDiv.innerHTML=''; progressSpan.innerText='第0/0题'; return; } currentQ=questions[currentIndex]; questionTextDiv.innerText=`${currentIndex+1}. ${currentQ.text}`; const letters=['A','B','C','D']; let html=''; currentQ.options.forEach((opt,idx)=>{ html+=`<div class="option" data-val="${letters[idx]}"><span class="prefix">${letters[idx]}</span><span>${opt}</span></div>`; }); optionsDiv.innerHTML=html; progressSpan.innerText=`第${currentIndex+1}/${questions.length}题`; feedbackDiv.className='feedback'; feedbackDiv.style.display='none'; feedbackDiv.innerHTML=''; nextBtn.style.display='none'; answered=false; document.querySelectorAll('.option').forEach(opt=>{ opt.addEventListener('click',()=>{ if(answered) return; const chosen=opt.getAttribute('data-val'); handleAnswer(chosen); }); }); }
function handleAnswer(chosen) { if(answered) return; answered=true; const q=currentQ; let isCorrect=false; if(q.answer.length===1){ isCorrect=(chosen===q.answer); }else{ const correctSet=new Set(q.answer.split('')); const chosenSet=new Set(chosen.split('')); isCorrect=(chosenSet.size===correctSet.size && [...chosenSet].every(c=>correctSet.has(c))); } let correctText=''; if(q.answer.length===1){ const idx=q.answer.charCodeAt(0)-65; correctText=`${q.answer}. ${q.options[idx]}`; }else{ const parts=[]; for(let ch of q.answer){ const idx=ch.charCodeAt(0)-65; parts.push(`${ch}. ${q.options[idx]}`); } correctText=parts.join('；'); } if(isCorrect){ feedbackDiv.className='feedback correct'; feedbackDiv.innerHTML='✅ 正确！'; }else{ let chosenText=''; if(chosen.length===1){ const idx=chosen.charCodeAt(0)-65; chosenText=`${chosen}. ${q.options[idx]}`; }else{ const parts=[]; for(let ch of chosen){ const idx=ch.charCodeAt(0)-65; parts.push(`${ch}. ${q.options[idx]}`); } chosenText=parts.join('；'); } feedbackDiv.className='feedback wrong'; feedbackDiv.innerHTML=`❌ 错误！ 正确答案：${correctText}`; } feedbackDiv.style.display='block'; nextBtn.style.display='block'; document.querySelectorAll('.option').forEach(el=>{ el.style.pointerEvents='none'; el.style.opacity='0.6'; }); }
function nextQuestion(){ if(!answered) return; if(currentIndex+1<questions.length){ currentIndex++; renderQuestion(); document.querySelectorAll('.option').forEach(el=>{ el.style.pointerEvents='auto'; el.style.opacity='1'; }); }else{ feedbackDiv.className='feedback correct'; feedbackDiv.innerHTML='🎉 恭喜！您已完成当前模块所有题目！🎉'; feedbackDiv.style.display='block'; nextBtn.style.display='none'; optionsDiv.innerHTML='<div style="text-align:center;padding:1rem;">✨ 完成 ✨</div>'; questionTextDiv.innerText='本模块已通关！'; } }
function resetModule(){ loadModule(currentModule, true); }
function shuffleQuestions(){ if(questions.length===0) return; questions=shuffleArray(questions); currentIndex=0; answered=false; renderQuestion(); document.querySelectorAll('.option').forEach(el=>{ el.style.pointerEvents='auto'; el.style.opacity='1'; }); }
function switchModule(module){ currentModule=module; loadModule(module, true); document.querySelectorAll('.tab').forEach(tab=>{ if(tab.getAttribute('data-module')===module) tab.classList.add('active'); else tab.classList.remove('active'); }); }
nextBtn.addEventListener('click', nextQuestion);
resetBtn.addEventListener('click', resetModule);
shuffleBtn.addEventListener('click', shuffleQuestions);
document.querySelectorAll('.tab').forEach(tab=>{ tab.addEventListener('click',()=>{ const mod=tab.getAttribute('data-module'); switchModule(mod); }); });
loadModule('skill', true);
</script>
</body>
</html>
