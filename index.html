    { text:"24小时回顾法膳食调查的优点是（ ）", options:["准确","应答率高","反映长期的膳食模式","适用于大样本"], answer:"B", explanation:"应答率较高。" },
    { text:"某幼儿园膳食调查前库存大米30kg，调查30天，期间多次零星购买大米240kg，调查结束时剩余大米60kg，调查期间该幼儿园平均每天消耗大米（ ）kg。", options:["10","7","3","5"], answer:"B", explanation:"(30+240-60)/30=7kg。" },
    { text:"某成年女性能量需要量1900kcal，正常情况下早餐应供给的能量为（ ）。", options:["200kcal","600kcal","900kcal","1900kcal"], answer:"B", explanation:"早餐占30%左右，约570kcal，最接近600。" },
    { text:"人日数是用被调查者一日三餐为标准折合的（ ）。", options:["用餐人数","用餐人次","用餐天数","标准天数"], answer:"C", explanation:"用餐天数。" },
    { text:"规定餐次比：早餐25%、午餐40%、晚餐35%，某成年男性膳食调查只吃了早餐和晚餐，确定该男性当天的人日数为（ ）。", options:["0.25","0.4","0.6","0.75"], answer:"C", explanation:"0.25+0.35=0.6。" },
    { text:"按照三餐的餐次比分别为30%、40%、30%，某幼儿园早餐有10名儿童进餐，午餐有20名儿童进餐，晚餐有30名儿童进餐，则总人日数为（ ）。", options:["10","20","30","60"], answer:"B", explanation:"10×0.3+20×0.4+30×0.3=20。" },
    { text:"关于“标准人”正确的定义是：（ ）。", options:["以极轻体力劳动成年女子为标准人","以轻体力劳动成年女子为标准人","以极轻体力劳动成年男子为标准人","以轻体力劳动成年男子为标准人"], answer:"D", explanation:"轻体力成年男子(60kg)。" },
    { text:"对某人群进行了3天的膳食调查，能量供给量有三种情况：2000kcal有12人，2400kcal有8人，2600kcal有6人。该人群的折合标准人系数为：（ ）。", options:["0.83","0.94","1.00","1.08"], answer:"B", explanation:"平均能量2261.5，2261.5/2400≈0.94。" },
    { text:"中国营养学会2007年制定《中国居民膳食指南》的内容有：（ ）。", options:["食物多样，谷类为主，粗细搭配","减少烹调油用量，吃清淡少盐膳食","食不过量，天天运动，保持健康体重","以上选项均正确"], answer:"D", explanation:"以上都包括。" },
    { text:"营养教育的主要内容之一是（ ）。", options:["有计划对相关人员进行营养知识培训","开展广泛的群众性营养与健康宣教活动","将相关营养知识培训内容纳入初级卫生保健服务体系","以上选项均正确"], answer:"D", explanation:"三者都是主要内容。" },
    { text:"评价食品卫生质量常用的细菌污染指标有（ ）。", options:["致病菌总数","菌落总数","大肠粪群数","以上都对"], answer:"D", explanation:"常用指标包括菌落总数、大肠菌群等。" },
    { text:"关于食品安全的说法正确的是（ ）。", options:["食品污染指食品被外来的但对人体健康无害的物质所污染","为了食品安全，需要定期监测食品污染","食品污染是可避免的","常见的农药中毒是通过食物链和生物富集的作用污染食物所引起"], answer:"B", explanation:"需要定期监测。" },
    { text:"关于建立个人健康与营养档案的4个程序，下面不正确的选项是（ ）。", options:["通过现存的健康资料、日常工作记录、系统的社区调查、广泛的健康筛选等收集健康与营养数据","对营养资料档案的所有内容、数据进行仔细核查和录入，建立可靠准确的信息数据库","将资料编号、归类、分档、固定放置，指定专人管理健康与营养资料","复印保存健康与营养档案纸类资料，电子文档要定期更新数据"], answer:"D", explanation:"无需复印全部纸类资料。" },
    { text:"下面不是社区个人健康档案和营养档案体现的主体框架的选项是（ ）。", options:["个人健康档案和营养档案的主体框架是以问题为导向的记录（POMR）","POMR主要内容包括：个人基础资料、问题目录、问题描述、病程流程表","具有收集资料全面、完整、便于统计和保护居民隐私等优点","不仅用于个人健康档案、也用于家庭健康档案"], answer:"C", explanation:"POMR的优点不包括“保护居民隐私”这一说法。" },
    { text:"关于社区营养干预项目计划的要求，不正确的选项是（ ）", options:["有针对性的项目计划应符合目标人群的特点，具有较强的针对性","成本较低的经费开支优先选用既花钱少又效益高措施","可行性的计划顺利开展取决于活动所涉及的资源、技术、经费、时间、社区的参与性等是否能符合或满足要求","易于评价的活动计划由参与者根据个人感受评价项目目标"], answer:"D", explanation:"评价需要客观指标，而非仅凭个人感受。" },
    { text:"关于收集社区定量资料的方法，下面不正确的选项是（ ）", options:["收集定量资料，获得人群发生某种事件的数量指标的研究方法称为半定量研究","收集方式有现场调查、信函调查和电话调查，信函和电话调查覆盖面较广，但回收率较低","面对面调查具有形式比较灵活、对调查对象文化程度要求不高、问卷回收率较高、准确性比较高等特点","社区健康促进活动是群众自发的活动"], answer:"A", explanation:"半定量研究不是定量资料收集方法。" },
    { text:"经预先定量包装或装入（灌入）容器中，向消费者直接提供的食品称为（ ）。", options:["预包装食品","包装食品","快速食品","即食食品"], answer:"A", explanation:"预包装食品的定义。" },
    { text:"预包装食品标签通则GB7718—2004规定产品的能量和营养素为（ ）。", options:["强制标示内容","非强制标示内容","参考标示内容","推荐标示内容"], answer:"A", explanation:"强制标示内容。" },
    { text:"食品标签是指食品包装容器上或附于食品包装容器的一切附签、吊牌、文字、图形、符号或其他一切（ ）。", options:["资料","材料","说明书","说明物"], answer:"D", explanation:"说明物。" },
    { text:"下列关于中国食品标签营养素参考值的选项中正确的是（ ）。", options:["已发布食品标签营养素参考值的营养素（包括能量）共有32种","是消费者选择食品时的一种营养参照尺度","可作为食品营养标签上比较食品营养素种类多少的参考标准","由中国卫生部发布"], answer:"B", explanation:"NRV是营养参照尺度。" },
    { text:"中国食物成分表2002中的食物编码采取（ ）位数字编码的方法。", options:["2","4","6","8"], answer:"C", explanation:"6位编码。" },
    { text:"常用的食品营养强化剂不包括（ ）", options:["L一盐酸赖氨酸","L一赖氨酸","L一天门冬氨酸盐","L一精氨酸盐"], answer:"D", explanation:"L-精氨酸盐不属于常用强化剂。" },
    { text:"保健食品主要通过胃肠道吸收，（ ）长期服用。", options:["可以","不可以","正常人不可以","病人不可以"], answer:"A", explanation:"可以长期服用。" },
    { text:"下列选项中属于保健食品基本特点的是（ ）", options:["按日常膳食服用不能显示效果","不可以是天然食品","可以取代药物使用","可以是添加了某种成分的食品"], answer:"D", explanation:"保健食品可添加特定成分。" },
    { text:"下列哪一项不是中国居民的膳食结构存在的主要问题（ ）", options:["城市居民脂肪供能比例超过30%","蔬菜、水果消费量较高","奶类食物消费量偏低","豆类及制品消费量偏低"], answer:"B", explanation:"蔬菜水果消费量其实偏低，不是较高。" },
    { text:"关于温饱模式膳食的特点描述错误的是（ ）", options:["谷类消费量大","动物性食品消费量小","膳食能量能基本满足人体需要","蛋白质的摄入量高"], answer:"D", explanation:"温饱模式蛋白质摄入量低。" },
    { text:"下列不符合营养型模式的膳食特点的选项是（ ）", options:["平均每天粮食消费约半斤左右","动物性食品每天消费较低","海产品消费量较高","每天能量摄入约2000kcal左右"], answer:"B", explanation:"营养型模式动物性食品消费适中或较高，不是较低。" },
    { text:"广东省居民膳食特点是（ ）", options:["以面类为膳食主体","动物性食物摄入量偏低","居民膳食少糖多盐","居民膳食多糖少盐"], answer:"C", explanation:"广东膳食少糖多盐。" },
    { text:"关于《中国居民膳食指南》的内容描述错误的是（ ）。", options:["食物要多样，肉类为主","多吃蔬菜、水果","每天吃奶类","经常吃适量鱼、禽、蛋、瘦肉"], answer:"A", explanation:"应以谷类为主，不是肉类为主。" },
    { text:"关于对青少年膳食指南的论述错误的是（ ）", options:["多吃谷类，供给充足的能量","保证鱼、肉、蛋、奶、豆类和蔬菜的摄入","避免盲目节食","饮酒应限量"], answer:"D", explanation:"青少年不应饮酒。" },  { text:"平衡膳食宝塔建议的各类食物摄入量是一个一定时期内的（ ）和比例。", options:["绝对值","平均值","相对值","累加值"], answer:"B", explanation:"平均值。" },
    { text:"关于保证营养平衡方面，不属于食谱编制原则的是（ ）", options:["满足每天膳食营养素及能量的供给","各营养素之间比例可以不考虑","注意荤素搭配","食物尽可能多样"], answer:"B", explanation:"必须考虑各营养素比例。" },
    { text:"测量者位于婴幼儿右侧测量身长，使BJD平卧于板中线，两手操作的正确方法是（ ）。", options:["左手固定小儿头部，右手滑动滑板紧贴小儿足跟","左手固定小儿腰部，右手滑动滑板紧贴小儿足跟","左手固定小儿髋部，右手滑动滑板紧贴小儿足跟","左手固定小儿膝部，右手滑动滑板紧贴小儿足跟"], answer:"A", explanation:"左手固定头部，右手移动滑板。" },
    { text:"胸围值的定义是指（ ）", options:["在受试者呼气尚未开始时读取带尺上与零点相交的数值","在受试者吸气尚未开始时读取带尺上与零点相交的数值","在受试者吸气刚开始时读取带尺上与零点相交的数值","在受试者呼气刚开始时读取带尺上与零点相交的数值"], answer:"A", explanation:"呼气未开始时读数。" },
    { text:"测量上臂松弛围时，被测者的肌肉（ ）", options:["由紧张变换到放松时勿移动卷尺","由紧张变换到放松前先取走卷尺","由紧张变换到放松前先移开卷尺","以上选项均错误"], answer:"A", explanation:"放松时勿移动卷尺。" },
    { text:"使用身高坐高计测试前应校正（ ）", options:["坐高计划度","坐高计零点","坐高计标尺","坐高计高度"], answer:"B", explanation:"校正零点。" },
    { text:"测量成人身高时，“两点呈水平”的正确姿势是（ ）", options:["被测者耳屏下缘与眼眶上缘呈水平位","被测者耳屏上缘与眼眶上缘呈水平位","被测者耳屏上缘与眼眶下缘呈水平位","被测者耳屏下缘与眼眶下缘呈水平位"], answer:"B", explanation:"耳屏上缘与眼眶上缘水平。" },
    { text:"蛋白质和（或）能量供给不能满足机体维持正常生理功能的需要可发生（ ）。", options:["蛋白质一能量营养不良症","蛋白质营养不良症","能量营养不良症","以上选项均错误"], answer:"A", explanation:"蛋白质-能量营养不良症。" },
    { text:"体格大小和生髓重度是评价（ ）的灵敏指标。", options:["经济状况","营养状况","遗传状况","照顾状况"], answer:"B", explanation:"营养状况。" },
    { text:"消瘦型营养不良多表现为（ ）", options:["以蛋白不足为主者表现为皮下脂肪和骨骼肌显著消耗和内脏器官萎缩","以能量不足为主者表现为皮下脂肪和骨骼肌显著消耗和内脏器官萎缩","A与B均正确","A与B均错误"], answer:"B", explanation:"能量不足为主。" },
    { text:"“匙状甲”往往见于（ ）的患者。", options:["严重缺铁性贫血","严重缺锌","A与B均正确","A与B均错误"], answer:"A", explanation:"缺铁性贫血。" },
    { text:"“口腔生殖器综合症”的症状有（ ）", options:["唇炎、口角炎、舌炎、鼻及脸部的脂溢性皮炎","阴囊炎","阴唇炎","以上选项均正确"], answer:"D", explanation:"以上都是。" },
    { text:"皮肤受到轻微挤压可出现散在出血点，受碰撞或受压后容易出现紫癜和淤斑，估计缺乏（ ）。", options:["维生素C","维生素B","维生素E","维生素A"], answer:"A", explanation:"缺乏维生素C导致毛细血管脆性增加。" },
    { text:"建议进行锌的实验室检查留取标本不正确的方法是（ ）", options:["留取粪便","留取空腹血","留取唾液","留取头发"], answer:"A", explanation:"粪便不用于锌检测。" },
    { text:"下面不属于产能营养素的是（ ）", options:["碳水化合物","蛋白质","脂肪","膳食纤维"], answer:"D", explanation:"膳食纤维不产能。" },
    { text:"人们所称半EAA是指（ ）", options:["Cys和met","met和Phe","Phe和Cys","Cys和Tyr"], answer:"D", explanation:"半必需氨基酸为胱氨酸和酪氨酸。" },
    { text:"以下哪一种情况会消耗脂肪作为能量来源？", options:["上课听讲","爬山4小时","打30分钟的篮球","散步1小时"], answer:"B", explanation:"长时间中等强度运动消耗脂肪。" },
    { text:"生长期的婴幼儿和青少年，孕期及恢复期的病人他们正处于（ ）", options:["B>0正氮平衡","B<0负氮平衡","B=0氮平衡","非平衡状态"], answer:"A", explanation:"正氮平衡。" },
    { text:"婴儿“弓形腿”，小儿“鸡胸”，妇女骨质疏松症都会由 缺乏引起。", options:["VD","VA","VE","VK"], answer:"A", explanation:"缺乏维生素D。" },
    { text:"成人碘缺乏时会导致（ ）", options:["地克病","克山病","异食症","地甲肿"], answer:"D", explanation:"地方性甲状腺肿。" },
    { text:"畜禽肉中的铁是属于（ ）", options:["贮存铁","功能铁","血红素铁","非血红素铁"], answer:"C", explanation:"血红素铁。" },
    { text:"缺乏维生素A不会引起（ ）", options:["暗适应能力降低","夜盲症","瘢皮病","皮肤干燥症"], answer:"C", explanation:"癞皮病是缺乏烟酸。" },
    { text:"缺乏维生素C主要会引起（ ）", options:["血液凝固慢","血流不止","坏血病","白血病"], answer:"C", explanation:"坏血病。" },
    { text:"以下哪些营养素在加工中最容易损失？（ ）", options:["维生素A和胡萝卜素","维生素C和胡萝卜素","维生素C和维生素B1","钙和铁"], answer:"C", explanation:"VC和B1最易损失。" },
    { text:"营养学上，从食物蛋白质的含量、（ ）和被人体利用程度三个方面来全面地评价食品蛋白质的营养价值。", options:["被消化吸收程度","蛋白质种类","氨基酸分类","蛋白质的生物价"], answer:"A", explanation:"消化吸收程度。" },
    { text:"食物中蛋白质含量测定一般使用（ ），测定食物中的氮含量。", options:["称量法","微量凯氏定氮法","灰化法","系数计算法"], answer:"B", explanation:"凯氏定氮法。" },
    { text:"食物中含氮量占蛋白质的（ ），由氮计算蛋白质的换算系数即是6.25。", options:["10%","14%","12%","16%"], answer:"D", explanation:"16%。" },
    { text:"蛋白质的消化率测定的实际应用中，一般不考虑粪代谢氮，不仅实验方法简便，且对人是有一定安全性，这种消化率称为（ ）。", options:["消化率","实际消化率","表观消化率","真消化率"], answer:"C", explanation:"表观消化率。" },
    { text:"蛋白质净利用率表达为（ ）", options:["消化率X生物价","功效比值X生物价","消化率X功效比值","利用率X生物价"], answer:"A", explanation:"NPU=消化率×生物价。" },
    { text:"食物脂肪的吸收率一般在（ ）以上。", options:["95%","85%","70%","80%"], answer:"D", explanation:"80%以上。" },
    { text:"各类食物的血糖指数一般是粗粮的（）细粮，复合碳水化合物（）精制糖。", options:["低于，高于","高于，低于","高于，高于","低于，低于"], answer:"A", explanation:"粗粮GI低于细粮，复合碳水GI低于精制糖。" },

// ======================== 通用刷题逻辑（无错误，手动下一题，选项打乱）========================
let currentModule = 'skill';
let questions = [];
let currentIndex = 0, answered = false, currentQ = null;

const progressSpan = document.getElementById('progress');
const questionTextDiv = document.getElementById('questionText');
const optionsDiv = document.getElementById('optionsContainer');
const feedbackDiv = document.getElementById('feedback');
const nextBtn = document.getElementById('nextBtn');
const resetBtn = document.getElementById('resetBtn');const shuffleBtn = document.getElementById('shuffleBtn');

function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function shuffleOptionsForSingle(q) { if (q.answer.length > 1) return q; const opts = [...q.options]; const letters = ['A','B','C','D']; let indices = [0,1,2,3]; for (let i = indices.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [indices[i], indices[j]] = [indices[j], indices[i]]; } const newOpts = indices.map(i => opts[i]); const oldAnswerIndex = q.answer.charCodeAt(0) - 65; const newAnswerIndex = indices.indexOf(oldAnswerIndex); const newAnswer = String.fromCharCode(65 + newAnswerIndex); return { ...q, options: newOpts, answer: newAnswer }; }
function loadModule(module, shouldShuffle = true) { let raw; if (module === 'skill') raw = [...SKILL_QUESTIONS]; else if (module === 'theory') raw = [...THEORY_SINGLE_QUESTIONS]; else raw = [...THEORY_MULTI_QUESTIONS]; if (shouldShuffle) raw = shuffleArray(raw); let processed = raw.map(q => { if (module !== 'multi') return shuffleOptionsForSingle(q); else return { ...q }; }); questions = processed; currentIndex = 0; answered = false; renderQuestion(); }
function renderQuestion() { if (!questions.length) { questionTextDiv.innerText = '暂无题目'; optionsDiv.innerHTML = ''; progressSpan.innerText = '第0 / 0题'; return; } currentQ = questions[currentIndex]; questionTextDiv.innerText = `${currentIndex+1}. ${currentQ.text}`; const letters = ['A','B','C','D']; let html = ''; currentQ.options.forEach((opt, idx) => { html += `<div class="option" data-val="${letters[idx]}"><span class="prefix">${letters[idx]}</span><span>${opt}</span></div>`; }); optionsDiv.innerHTML = html; progressSpan.innerText = `第${currentIndex+1} / ${questions.length}题`; feedbackDiv.className = 'feedback'; feedbackDiv.style.display = 'none'; feedbackDiv.innerHTML = ''; nextBtn.style.display = 'none'; answered = false; document.querySelectorAll('.option').forEach(opt => { opt.addEventListener('click', () => { if (answered) return; const chosen = opt.getAttribute('data-val'); handleAnswer(chosen); }); }); }
function handleAnswer(chosen) { if (answered) return; answered = true; const q = currentQ; let isCorrect = false; if (q.answer.length === 1) { isCorrect = (chosen === q.answer); } else { const correctSet = new Set(q.answer.split('')); const chosenSet = new Set(chosen.split('')); isCorrect = (chosenSet.size === correctSet.size && [...chosenSet].every(c => correctSet.has(c))); } let correctText = ''; if (q.answer.length === 1) { const idx = q.answer.charCodeAt(0) - 65; correctText = `${q.answer}. ${q.options[idx]}`; } else { const parts = []; for (let ch of q.answer) { const idx = ch.charCodeAt(0) - 65; parts.push(`${ch}. ${q.options[idx]}`); } correctText = parts.join('；'); } if (isCorrect) { feedbackDiv.className = 'feedback correct'; feedbackDiv.innerHTML = `✅ 正确！<br>📘 ${q.explanation || '无解析'}`; } else { let chosenText = ''; if (chosen.length === 1) { const idx = chosen.charCodeAt(0) - 65; chosenText = `${chosen}. ${q.options[idx]}`; } else { const parts = []; for (let ch of chosen) { const idx = ch.charCodeAt(0) - 65; parts.push(`${ch}. ${q.options[idx]}`); } chosenText = parts.join('；'); } feedbackDiv.className = 'feedback wrong'; feedbackDiv.innerHTML = `❌ 错误！<br>您的答案：${chosenText}<br>✔ 正确答案：${correctText}<br>📘 ${q.explanation || '无解析'}`; } feedbackDiv.style.display = 'block'; nextBtn.style.display = 'block'; document.querySelectorAll('.option').forEach(el => { el.style.pointerEvents = 'none'; el.style.opacity = '0.6'; }); }
function nextQuestion() { if (!answered) return; if (currentIndex + 1 < questions.length) { currentIndex++; renderQuestion(); document.querySelectorAll('.option').forEach(el => { el.style.pointerEvents = 'auto'; el.style.opacity = '1'; }); } else { feedbackDiv.className = 'feedback correct'; feedbackDiv.innerHTML = '🎉 恭喜！您已完成当前模块所有题目！🎉<br>可打乱顺序或切换模块继续复习。'; feedbackDiv.style.display = 'block'; nextBtn.style.display = 'none'; optionsDiv.innerHTML = '<div style="text-align:center; padding:1rem;">✨ 完成 ✨</div>'; questionTextDiv.innerText = '本模块已通关！'; } }
function resetModule() { loadModule(currentModule, true); }
function shuffleQuestions() { if (questions.length === 0) return; questions = shuffleArray(questions); currentIndex = 0; answered = false; renderQuestion(); document.querySelectorAll('.option').forEach(el => { el.style.pointerEvents = 'auto'; el.style.opacity = '1'; }); }
function switchModule(module) { currentModule = module; loadModule(module, true); document.querySelectorAll('.tab').forEach(tab => { if (tab.getAttribute('data-module') === module) tab.classList.add('active'); else tab.classList.remove('active'); }); }
nextBtn.addEventListener('click', nextQuestion);
resetBtn.addEventListener('click', resetModule);
shuffleBtn.addEventListener('click', shuffleQuestions);
document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => { const mod = tab.getAttribute('data-module'); switchModule(mod); }); });
loadModule('skill', true);
</script>
