<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>公共营养师三级 · 分模块刷题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #eef5ff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .tabs {
            display: flex;
            background: #f0f7ff;
            border-bottom: 1px solid #cde3f0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            font-weight: 600;
            color: #2c6e9e;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
        }
        .tab.active {
            background: white;
            color: #1a6b9f;
            border-bottom: 3px solid #1a6b9f;
        }
        .panel {
            padding: 1.5rem;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .progress {
            background: #d9eaff;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
        }
        .shuffle-btn {
            background: #eef2fa;
            border: 1px solid #bdd6e8;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .question {
            background: #f9fdfe;
            border: 1px solid #d4e3f0;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1rem;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #134b73;
            margin-bottom: 1rem;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        .option {
            background: white;
            border: 1px solid #cde3f0;
            border-radius: 1rem;
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .option:hover {
            background: #e9f2fa;
        }
        .prefix {
            background: #e3edf6;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.8rem;
            font-weight: bold;
        }
        .feedback {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .feedback.correct {
            background: #e0f2e3;
            border-left: 4px solid #2e8b57;
            display: block;
        }
        .feedback.wrong {
            background: #ffe9e9;
            border-left: 4px solid #c23d3d;
            display: block;
        }
        .next-btn, .reset-btn {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.8rem;
            border: none;
            border-radius: 40px;
            background: #1a6b9f;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        .reset-btn {
            background: #5f8aaf;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #6f9bc0;
            border-top: 1px solid #e0edf5;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="tabs">
        <button class="tab active" data-module="skill">📋 技能考核</button>
        <button class="tab" data-module="theory">📖 理论·单选题</button>
        <button class="tab" data-module="multi">🔖 理论·多选题</button>
    </div>
    <div class="panel">
        <div class="info-bar">
            <span class="progress" id="progress">第1 / 0题</span>
            <button class="shuffle-btn" id="shuffleBtn">🎲 打乱顺序</button>
        </div>
        <div class="question">
            <div class="question-text" id="questionText">加载中...</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedback"></div>
        </div>
        <button class="next-btn" id="nextBtn" style="display: none;">➡ 下一题</button>
        <button class="reset-btn" id="resetBtn">🔄 重置当前模块</button>
    </div>
    <footer>选对后需手动点击「下一题」 | 题目源自官方题库，答案已校对</footer>
</div>

<script>
    // ======================== 题库（来自您提供的PDF）========================
    const SKILL = [
        { text: "张先生，35岁，180cm，76kg，标准体重(kg)是多少？", options: ["75","78","80","85"], answer: "A", explanation: "标准体重=身高-105=75kg" },
        { text: "张先生的标准体重指数约为？", options: ["4%","1.3%","20%","15%"], answer: "B", explanation: "(76-75)/75×100%=1.33%" },
        { text: "张先生的BMI是？", options: ["23.5","19.4","27.0","28.2"], answer: "A", explanation: "76÷1.8²≈23.46" },
        { text: "婴幼儿哭闹无法测体重时可采用？", options: ["减差法","扣除衣物法","直接称重法","间接测量法"], answer: "A", explanation: "减差法：抱婴儿总重减母亲体重" },
        { text: "婴幼儿头围测量软尺零点固定在？", options: ["枕骨粗隆","左侧眉弓上缘","右侧眉弓上缘","右侧眉弓下缘"], answer: "C", explanation: "右侧眉弓上缘→枕骨粗隆→回原点" },
        { text: "测量婴幼儿胸围时，皮下脂肪较厚者软尺应？", options: ["轻轻接触皮肤","稍紧些","紧贴皮肤","松弛一些"], answer: "B", explanation: "稍紧以抵消脂肪层误差" },
        { text: "女性9608，男性8000，女性构成比？", options: ["45.4%","54.6%","50.2%","48.7%"], answer: "B", explanation: "9608/17608≈54.6%" },
        { text: "A小区新病例546，人口4532，发病率？", options: ["12.05%","10.85%","8.3%","15.2%"], answer: "A", explanation: "546/4532≈12.05%" },
        { text: "轻体力成年男性每日能量推荐量？", options: ["2100","2200","2400","2600"], answer: "C", explanation: "2400kcal" }
    ];

    const THEORY_SINGLE = [
        { text: "职业道德在市场经济中的作用？", options: ["鼓励自由择业","遏制牟利最大化","促进行为规范化","克服利益驱动"], answer: "C", explanation: "职业道德促进行为规范" },
        { text: "关于职业道德与事业成功的关系，正确的是？", options: ["职业道德是重要条件","水平高肯定成功","缺乏道德也会成功","无关"], answer: "A", explanation: "职业道德是事业成功的重要条件" },
        { text: "不符合待人热情要求的是？", options: ["严肃待客","主动服务","微笑大方","亲切友好"], answer: "A", explanation: "严肃待客不符合热情要求" },
        { text: "关于创新的不正确说法是？", options: ["创新需要标新立异","服务也需要创新","创新是企业进步的灵魂","引进新技术不算创新"], answer: "D", explanation: "引进新技术也是创新" },
        { text: "党参的主要作用不包括？", options: ["抗应激","保肾保肝","抗溃疡","改善贫血"], answer: "B", explanation: "党参不保肾保肝" },
        { text: "冬虫夏草的主要作用不包括？", options: ["调节免疫","抗肿瘤","改善心肌缺血","兴奋中枢"], answer: "D", explanation: "无兴奋中枢作用" },
        { text: "青少年运动员每1000kcal需B1、B2、烟酸？", options: ["1,1,10 mg","1,10,1 mg","10,1,1 mg","1,1,1 mg"], answer: "A", explanation: "运动营养标准" },
        { text: "肿瘤外源性致病因素？", options: ["免疫状态","霉菌毒素","遗传因素","激素水平"], answer: "B", explanation: "霉菌毒素是外源性化学因素" },
        { text: "不完全蛋白质的正确描述？", options: ["氨基酸齐全是不完全","酪蛋白是完全蛋白","玉米胶蛋白是不完全","二者正确"], answer: "C", explanation: "玉米胶蛋白缺乏赖氨酸" },
        { text: "缺铁性贫血可导致？", options: ["月经紊乱","骨质软化","呼吸困难","匙状甲"], answer: "D", explanation: "匙状甲是缺铁典型表现" },
        { text: "母乳与牛乳相比正确的是？", options: ["脂肪更高","蛋白更高","乳糖更高","维生素更低"], answer: "C", explanation: "母乳乳糖约7%" },
        { text: "乳母较孕前能量每日增加？", options: ["200","300","400","500 kcal"], answer: "D", explanation: "乳母增加500kcal" },
        { text: "蔬菜水果主要卫生问题？", options: ["核辐射","农药残留","黄曲霉素","抗菌素"], answer: "B", explanation: "农药残留是首要问题" },
        { text: "最常见食品生物性污染？", options: ["病毒","细菌和毒素","真菌","真菌毒素"], answer: "B", explanation: "细菌性污染最常见" },
        { text: "24h回顾法膳食调查的优点？", options: ["准确","应答率高","反映长期模式","大样本"], answer: "B", explanation: "应答率较高" },
        { text: "中国成人肥胖BMI≥？", options: ["24","26","28","30"], answer: "C", explanation: "BMI≥28为肥胖" }
    ];

    const THEORY_MULTI = [
        { text: "人体的条件必需氨基酸有？", options: ["赖氨酸","酪氨酸","半胱氨酸","亮氨酸"], answer: "BC", explanation: "酪氨酸和半胱氨酸可由必需氨基酸转化" },
        { text: "影响铁吸收的体内因素有？", options: ["铁需要量","铁储存量","食物通过时间","胃酸"], answer: "ABCD", explanation: "所有选项均影响铁吸收" },
        { text: "谷粒胚芽含有丰富的？", options: ["蛋白质","脂类","矿物质","维生素"], answer: "ABCD", explanation: "胚芽营养丰富" },
        { text: "我国膳食结构调整不应？", options: ["大增动物性食物","增加肉类比重","增加谷类比重","坚持植物为主"], answer: "ABC", explanation: "不应盲目增加动物性食物" },
        { text: "锌的主要食物来源？", options: ["粮谷类","动物肝脏","蔬菜类","海产品"], answer: "BD", explanation: "动物肝脏和海产品锌含量高" }
    ];

    // 当前状态
    let currentModule = 'skill';
    let questions = [];
    let currentIndex = 0;
    let answered = false;
    let currentQ = null;

    // DOM
    const progressSpan = document.getElementById('progress');
    const questionTextDiv = document.getElementById('questionText');
    const optionsDiv = document.getElementById('optionsContainer');
    const feedbackDiv = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');

    // 打乱数组
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // 打乱选项（仅用于单选题）
    function shuffleOptions(q) {
        if (q.answer.length > 1) return q; // 多选题不单独打乱选项
        const opts = [...q.options];
        const letters = ['A','B','C','D'];
        let indices = [0,1,2,3];
        for (let i = indices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        const newOpts = indices.map(i => opts[i]);
        const oldAnswerIndex = q.answer.charCodeAt(0) - 65;
        const newAnswerIndex = indices.indexOf(oldAnswerIndex);
        const newAnswer = String.fromCharCode(65 + newAnswerIndex);
        return { ...q, options: newOpts, answer: newAnswer };
    }

    // 加载模块
    function loadModule(module, shouldShuffle = true) {
        let raw;
        if (module === 'skill') raw = [...SKILL];
        else if (module === 'theory') raw = [...THEORY_SINGLE];
        else raw = [...THEORY_MULTI];
        if (shouldShuffle) raw = shuffleArray(raw);
        // 对单选题打乱选项
        let processed = raw.map(q => {
            if (module !== 'multi') return shuffleOptions(q);
            else return { ...q };
        });
        questions = processed;
        currentIndex = 0;
        answered = false;
        renderQuestion();
    }

    // 渲染当前题目
    function renderQuestion() {
        if (!questions.length) {
            questionTextDiv.innerText = '暂无题目';
            optionsDiv.innerHTML = '';
            progressSpan.innerText = '第0 / 0题';
            return;
        }
        currentQ = questions[currentIndex];
        questionTextDiv.innerText = `${currentIndex+1}. ${currentQ.text}`;
        const letters = ['A','B','C','D'];
        let html = '';
        currentQ.options.forEach((opt, idx) => {
            html += `<div class="option" data-val="${letters[idx]}">
                        <span class="prefix">${letters[idx]}</span>
                        <span>${opt}</span>
                     </div>`;
        });
        optionsDiv.innerHTML = html;
        progressSpan.innerText = `第${currentIndex+1} / ${questions.length}题`;
        feedbackDiv.className = 'feedback';
        feedbackDiv.style.display = 'none';
        feedbackDiv.innerHTML = '';
        nextBtn.style.display = 'none';
        answered = false;

        // 绑定选项点击事件
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', () => {
                if (answered) return;
                const chosen = opt.getAttribute('data-val');
                handleAnswer(chosen);
            });
        });
    }

    // 处理答案
    function handleAnswer(chosen) {
        if (answered) return;
        answered = true;
        const q = currentQ;
        let isCorrect = false;
        if (q.answer.length === 1) { // 单选
            isCorrect = (chosen === q.answer);
        } else { // 多选
            const correctSet = new Set(q.answer.split(''));
            const chosenSet = new Set(chosen.split(''));
            isCorrect = (chosenSet.size === correctSet.size && [...chosenSet].every(c =>correctSet.has(c)));
        }

        // 构建正确选项文本
        let correctText = '';
        if (q.answer.length === 1) {
            const idx = q.answer.charCodeAt(0) - 65;
            correctText = `${q.answer}. ${q.options[idx]}`;
        } else {
            const parts = [];
            for (let ch of q.answer) {
                const idx = ch.charCodeAt(0) - 65;
                parts.push(`${ch}. ${q.options[idx]}`);
            }
            correctText = parts.join('；');
        }

        if (isCorrect) {
            feedbackDiv.className = 'feedback correct';
            feedbackDiv.innerHTML = `✅ 正确！<br>📘 ${q.explanation || '无解析'}`;
        } else {
            let chosenText = '';
            if (chosen.length === 1) {
                const idx = chosen.charCodeAt(0) - 65;
                chosenText = `${chosen}. ${q.options[idx]}`;
            } else {
                const parts = [];
                for (let ch of chosen) {
                    const idx = ch.charCodeAt(0) - 65;
                    parts.push(`${ch}. ${q.options[idx]}`);
                }
                chosenText = parts.join('；');
            }
            feedbackDiv.className = 'feedback wrong';
            feedbackDiv.innerHTML = `❌ 错误！<br>您的答案：${chosenText}<br>✔ 正确答案：${correctText}<br>📘 ${q.explanation || '无解析'}`;
        }
        feedbackDiv.style.display = 'block';
        nextBtn.style.display = 'block';
        // 禁用选项点击
        document.querySelectorAll('.option').forEach(el => {
            el.style.pointerEvents = 'none';
            el.style.opacity = '0.6';
        });
    }

    // 下一题
    function nextQuestion() {
        if (!answered) return;
        if (currentIndex + 1 < questions.length) {
            currentIndex++;
            renderQuestion();
            // 恢复点击样式
            document.querySelectorAll('.option').forEach(el => {
                el.style.pointerEvents = 'auto';
                el.style.opacity = '1';
            });
        } else {
            feedbackDiv.className = 'feedback correct';
            feedbackDiv.innerHTML = '🎉 恭喜！您已完成当前模块所有题目！🎉<br>可打乱顺序或切换模块继续复习。';
            feedbackDiv.style.display = 'block';
            nextBtn.style.display = 'none';
            optionsDiv.innerHTML = '<div style="text-align:center; padding:1rem;">✨ 完成 ✨</div>';
            questionTextDiv.innerText = '本模块已通关！';
        }
    }

    // 重置模块（保留打乱机制）
    function resetModule() {
        loadModule(currentModule, true);
    }

    // 打乱当前模块的题目顺序
    function shuffleQuestions() {
        if (questions.length === 0) return;
        questions = shuffleArray(questions);
        currentIndex = 0;
        answered = false;
        renderQuestion();
        document.querySelectorAll('.option').forEach(el => {
            el.style.pointerEvents = 'auto';
            el.style.opacity = '1';
        });
    }

    // 切换标签
    function switchModule(module) {
        currentModule = module;
        loadModule(module, true);
        // 高亮tab
        document.querySelectorAll('.tab').forEach(tab => {
            if (tab.getAttribute('data-module') === module) {
                tab.classList.add('active');
            } else {
                tab.classList.remove('active');
            }
        });
    }

    // 事件绑定
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetModule);
    shuffleBtn.addEventListener('click', shuffleQuestions);
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const mod = tab.getAttribute('data-module');
            switchModule(mod);
        });
    });

    // 初始化
    loadModule('skill', true);
</script>
</body>
</html>
