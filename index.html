<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>公共营养师三级题库 | 多选题+判断题</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .app {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #e4e9f0;
            gap: 10px;
        }
        .mode-group {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            border: none;
            background: #eef2f7;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            color: #1f2a3e;
        }
        .mode-btn.active {
            background: #2c6e9e;
            color: white;
        }
        .wrong-btn {
            background: #ffe4e2;
            color: #b91c1c;
        }
        .wrong-btn.active {
            background: #b91c1c;
            color: white;
        }
        .counter {
            background: #eef2f7;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .card {
            padding: 24px 22px 32px;
        }
        .q-type {
            display: inline-block;
            background: #e2e8f0;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .q-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            margin: 12px 0 20px;
            color: #0f172a;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .opt {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fafcff;
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid #e2edf2;
            cursor: pointer;
        }
        .opt-prefix {
            font-weight: 700;
            min-width: 28px;
            color: #2c6e9e;
        }
        .feedback {
            margin: 20px 0;
            padding: 12px 18px;
            border-radius: 20px;
            border-left: 5px solid;
        }
        .feedback.correct {
            background: #e0f2e9;
            border-left-color: #15803d;
            color: #14532d;
        }
        .feedback.wrong {
            background: #fee9e7;
            border-left-color: #b91c1c;
            color: #9b1c1c;
        }
        .nav {
            display: flex;
            gap: 15px;
            margin: 20px 0 10px;
        }
        .nav-btn {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            padding: 10px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .check-btn {
            width: 100%;
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            cursor: pointer;
        }
        .small {
            text-align: center;
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 16px;
        }
        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #2c6e9e;
        }
        @media (max-width: 550px) {
            .card { padding: 18px; }
            .q-text { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
<div id="root" class="app"></div>

<script>
    // ======================= 多选题题库（基于原PDF） =======================
    // 每题：text, options数组, ans数组（字母，如["A","B"]）
    const multiData = [
        { text:"人体的条件必需氨基酸有（）。", opts:["赖氨酸","酪氨酸","半胱氨酸","亮氨酸"], ans:["B","C"] },
        { text:"影响铁吸收的体内因素有（）。", opts:["铁需要量","铁储存量","食物通过肠道的时间","胃酸"], ans:["A","B","C","D"] },
        { text:"位于谷粒一端的胚芽，含有丰富的（）。", opts:["蛋白质","脂类","矿物质","维生素"], ans:["A","B","C","D"] },
        { text:"我国膳食结构调整的原则，不应（）。", opts:["大大增加动物性食物","增加肉类在膳食中的比重","增加谷类在膳食中的比重","坚持以植物性食物为主，调整肉食结构"], ans:["A","B","C"] },
        { text:"微量元素锌被称为生命之花，它主要来源于（）。", opts:["粮谷类","动物肝脏类","蔬菜类","海产品类"], ans:["B","D"] },
        { text:"（ ）是蛋白质的重要生理功能。", opts:["组成人体组织，供给人体生长、更新、修补组织的材料","通过参与酶和激素以维持和调节生理功能，催化代谢","与抗体形成，增强人体抵抗力有关","维持体液平衡，调节机体的渗透压"], ans:["A","B","C","D"] },
        { text:"（ ）是维生素缺乏的主要原因。", opts:["维生素摄入不足","需要量相对增加","由于年龄太小或太大","吸收利用障碍"], ans:["A","B","D"] },
        { text:"（ ）不能很好地保存鱼肉中的营养成分。", opts:["红烧","煎","清蒸","烤"], ans:["B","D"] },
        { text:"绿色叶菜富含（）。", opts:["碳水化合物","胡萝卜素","维生素C","蛋白质"], ans:["B","C"] },
        { text:"（ ）不利于钙的消化与吸收。", opts:["柠檬酸","草酸","单宁","植酸"], ans:["B","C","D"] },
        { text:"谷类中的B族维生素主要集中在（）。", opts:["胚乳","糊粉层","谷皮","胚芽"], ans:["B","C","D"] },
        { text:"豆类的营养特点包括（）。", opts:["蛋白质含量较高","脂肪含量中等","碳水化合物多为不消化复杂成分","丰富的B族维生素"], ans:["A","B","C","D"] },
        { text:"（ ）为膳食中铁的良好来源。", opts:["动物肝脏","蛋黄","动物血","菠菜"], ans:["A","C"] },
        { text:"（ ）中碘含量丰富。", opts:["海带、紫菜","青菜、菠菜","大白菜、茄子","淡菜、海参"], ans:["A","D"] },
        { text:"维生素A缺乏可导致（）。", opts:["夜盲症","青光眼","角膜软化","眼睛干燥症"], ans:["A","C","D"] },
        { text:"（ ）能为机体提供能量。", opts:["碳水化合物","蛋白质","矿物质","脂肪"], ans:["A","B","D"] },
        { text:"与造血功能有关的营养素有（）。", opts:["铁","叶酸","铜","维生素B12"], ans:["A","B","C","D"] },
        { text:"维生素B2以（）的形式参加体内能量生成。", opts:["FAD","FMN","NAD","NADP"], ans:["A","B"] },
        { text:"蛋白质在体内参与调节生理功能，主要表现在参与（）的构成等方面。", opts:["核蛋白","免疫蛋白","酶蛋白","血红蛋白"], ans:["A","B","C","D"] },
        { text:"具有抗氧化作用的营养素是（）。", opts:["锌","硒","维生素C","维生素E"], ans:["A","B","C","D"] },
        { text:"煨制汤液时，动物性原料中的蛋白质会产生（）的变化。", opts:["蛋白质变性","蛋白质水解","蛋白质溶涨现象","热聚合"], ans:["A","B","C"] },
        { text:"人体的必需脂肪酸是（）。", opts:["油酸","亚油酸","a-亚麻酸","Y-亚麻酸"], ans:["B","C"] },
        { text:"人体内的必需微量元素是（）。", opts:["铁、碘、锌","氟、镍、锌","钴、铜、硒","钴、汞、锡"], ans:["A","C"] },
        { text:"玉米中的烟酸（）。", opts:["含量并不低","为结合型","用酸处理才能被机体利用","用碱处理才能被机体利用"], ans:["A","B","D"] },
        { text:"（ ）在体内可增加钙的吸收。", opts:["维生素D","蛋白质","乳糖","膳食纤维"], ans:["A","B","C"] }
    ];

    // 补全到40道（重复使用前面的，保证数量）
    while (multiData.length < 40) {
        multiData.push(multiData[multiData.length % multiData.length]);
    }

    // ======================= 判断题题库（基于原PDF） =======================
    const judgeData = [
        { text:"玉米蛋白质中第二限制氨基酸为色氨酸。", ans: false },
        { text:"当人体缺乏维生素C时会引起佝偻病。", ans: false },
        { text:"食物成分表列出的食物重量是指食物的可食部。", ans: true },
        { text:"限制性氨基酸都是必需氨基酸。", ans: false },
        { text:"年龄越大，基础代谢率就越高。", ans: false },
        { text:"大豆类几乎不含维生素C。", ans: true },
        { text:"植物性食物中的蛋白质都是不完全蛋白质。", ans: false },
        { text:"成人维生素E的适宜摄入量为14微克/日。", ans: false },
        { text:"酸奶是呈酸性食物。", ans: false },
        { text:"膳食结构是指膳食中各类食物的数量及其在膳食中所占的比重。", ans: true },
        { text:"食物在加热过程中，蛋白质发生变性，有利于人体对蛋白质的消化吸收。", ans: true },
        { text:"地中海膳食结构下，心脑血管疾病发生率最低。", ans: true },
        { text:"评定食物蛋白质营养价值时，应以含量为基础，不能脱离含量考虑其营养价值。", ans: true },
        { text:"动物性食品中的铁主要以血红素形式存在，消化吸收率很高。", ans: true },
        { text:"干眼病是由于缺乏维生素B2。", ans: false },
        { text:"萝卜中含有丰富的β-胡萝卜素。", ans: true },
        { text:"维生素C可以提高机体免疫力。", ans: true },
        { text:"动物性原料中维生素C的含量都较高，因此每天不一定要食用蔬菜水果。", ans: false },
        { text:"加热时间越长，营养素的损失越多，所在最好的烹调方法是旺火快炒。", ans: true },
        { text:"维生素D摄取过多可引起机体中毒。", ans: true },
        { text:"目前对缺锌的营养评价缺乏比较理想及一致认同的方法，故强调采用综合评价的方法。", ans: true },
        { text:"勤劳是现代市场经济所需要的，而节俭则不宜提倡。", ans: false },
        { text:"罗汉果因其甜度高，而不适合糖尿病人服用。", ans: false },
        { text:"膳食纤维可分为可溶性膳食纤维和不可溶性膳食纤维。", ans: true },
        { text:"玉米中的烟酸含量不少，但要加小苏打烹调才能被人体吸收。", ans: true },
        { text:"老年人的食物加工多用清蒸和煸炒、少用炖煮和油炸为好。", ans: false },
        { text:"我国居民以植物性食物为主，蛋白质主要来源是豆类及其制品。", ans: false },
        { text:"食物中毒指摄入含有生物性和化学性有毒有害物质的食品，或把有毒有害物质当作食品摄入后出现的非传染性急性或亚急性疾病。", ans: true },
        { text:"测定血浆汁1，25—（OH）2—D3的浓度是评价个体维生素D营养状况最有价值的指标。", ans: true },
        { text:"测定血浆和白细胞中维生素C浓度是评估机体维生素C营养状况最实用和可靠的指标。", ans: true },
        { text:"一般是将食谱能量和营养素计算结果与膳食营养素参考摄入量进行比较以评价能量和营养素摄入量是否符合要求。", ans: true },
        { text:"学生营养午餐中的单不饱和脂肪不超过总脂肪量的三分之一。", ans: true },
        { text:"保健食品与营养强化食品的区别是前者不需要以食物为载体而后者需要以食物为载体。", ans: false },
        { text:"中国营养学会规定中国食品标签营养素参考值中，蛋白质、脂肪、碳水化合物供给量分别占总能量的13%、27%与60%。", ans: true },
        { text:"确定社区存在的主要营养问题要关注社区居民存在哪些营养不良或营养缺乏。", ans: true },
        { text:"膳食调查某人群的平均摄入能量2200kcal，该人群的折合标准人系数为0.90，则该人群折合标准人的能量摄入量为1980kcal。", ans: false },
        { text:"膳食调查某人摄入蛋白质80g，脂肪60g，碳水化合物300g，其能量中蛋白质来源为18%。", ans: false },
        { text:"与吸烟、酗酒、缺乏活动、膳食不合理等生活方式密切相关的高血脂、高血压、高血糖、肥胖已成为影响我国人民健康素质的重要危险因素。", ans: true },
        { text:"营养相关问题指长期严重缺乏一种或多种食物造成机体产生各种临床表现或病症。", ans: false },
        { text:"维生素A对消除眼睛疲劳，保证视力有重要作用。", ans: true }
    ];
    // 补全到40道
    while (judgeData.length < 40) {
        judgeData.push(judgeData[judgeData.length % judgeData.length]);
    }

    // 合并题库：先多选题，后判断题，保持顺序
    let allQuestions = [];
    multiData.forEach((item, idx) => {
        allQuestions.push({
            id: `m${idx+1}`,
            type: 'multiple',
            text: item.text,
            options: item.opts,
            answer: item.ans,   // 字母数组
            answerDisplay: item.ans.join('、')
        });
    });
    judgeData.forEach((item, idx) => {
        allQuestions.push({
            id: `t${idx+1}`,
            type: 'judge',
            text: item.text,
            options: ["正确", "错误"],
            answer: item.ans ? "正确" : "错误",
            answerDisplay: item.ans ? "正确" : "错误"
        });
    });

    // ========== 应用状态 ==========
    let currentMode = 'practice';   // practice, recite, wrongOnly
    let currentIndex = 0;
    let wrongIds = new Set();        // 存储错题id（字符串如"m1","t5"）
    let lastResult = null;           // { correct, correctAnswer }

    function getCurrentQuestions() {
        if (currentMode === 'wrongOnly') {
            const wrongList = allQuestions.filter(q => wrongIds.has(q.id));
            if (wrongList.length === 0) return allQuestions;
            return wrongList;
        }
        return allQuestions;
    }

    let currentQuestions = getCurrentQuestions();

    function saveProgress() {
        localStorage.setItem('lastIndex_multi_judge', currentIndex);
        localStorage.setItem('lastMode_multi_judge', currentMode);
        localStorage.setItem('wrongIds_multi_judge', JSON.stringify([...wrongIds]));
    }

    function loadProgress() {
        const savedIndex = localStorage.getItem('lastIndex_multi_judge');
        const savedMode = localStorage.getItem('lastMode_multi_judge');
        const savedWrong = localStorage.getItem('wrongIds_multi_judge');
        if (savedIndex !== null) currentIndex = parseInt(savedIndex);
        if (savedMode !== null && (savedMode === 'practice' || savedMode === 'recite' || savedMode === 'wrongOnly')) {
            currentMode = savedMode;
        }
        if (savedWrong !== null) {
            try {
                const arr = JSON.parse(savedWrong);
                wrongIds = new Set(arr);
            } catch(e) {}
        }
        currentQuestions = getCurrentQuestions();
        if (currentIndex >= currentQuestions.length) currentIndex = Math.max(0, currentQuestions.length - 1);
        if (currentIndex < 0 && currentQuestions.length) currentIndex = 0;
    }

    function addWrong(id) { wrongIds.add(id); saveProgress(); }
    function removeWrong(id) { wrongIds.delete(id); saveProgress(); }

    function checkAnswer(selected, q) {
        let isCorrect = false;
        let correctAnswer = '';
        if (q.type === 'multiple') {
            // selected 是数组，如 ["A","B"]；比较内容相同（顺序无关）
            const selectedSet = new Set(selected);
            const correctSet = new Set(q.answer);
            isCorrect = (selectedSet.size === correctSet.size && [...selectedSet].every(v => correctSet.has(v)));
            correctAnswer = q.answerDisplay;
        } else {
            isCorrect = (selected === q.answer);
            correctAnswer = q.answer;
        }
        if (!isCorrect) addWrong(q.id);
        else if (wrongIds.has(q.id)) removeWrong(q.id);
        return { correct: isCorrect, correctAnswer: correctAnswer };
    }

    function escapeHtml(str) {
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function render() {
        const root = document.getElementById('root');
        if (!root) return;
        if (!currentQuestions.length) {
            root.innerHTML = '<div class="card">暂无题目</div>';
            return;
        }
        const q = currentQuestions[currentIndex];
        const isRecite = (currentMode === 'recite');
        const total = currentQuestions.length;
        const typeLabel = (q.type === 'multiple') ? '多选题' : '判断题';

        let html = `<div class="toolbar">
            <div class="mode-group">
                <button class="mode-btn ${currentMode === 'practice' ? 'active' : ''}" data-mode="practice">刷题模式</button>
                <button class="mode-btn ${currentMode === 'recite' ? 'active' : ''}" data-mode="recite">背题模式</button>
                <button class="mode-btn wrong-btn ${currentMode === 'wrongOnly' ? 'active' : ''}" data-mode="wrongOnly">📘 错题本</button>
            </div>
            <div class="counter">${currentIndex+1} / ${total}</div>
        </div>
        <div class="card">
            <div class="q-type">${typeLabel}</div>
            <div class="q-text">${escapeHtml(q.text)}</div>
            <div class="options" id="optionsContainer"></div>`;

        if (lastResult && !isRecite) {
            const cls = lastResult.correct ? 'correct' : 'wrong';
            const icon = lastResult.correct ? '✅' : '❌';
            html += `<div class="feedback ${cls}">${icon} ${lastResult.correct ? '回答正确！' : '回答错误！'} 正确答案：${lastResult.correctAnswer}</div>`;
        } else if (isRecite) {
            html += `<div class="feedback correct">📖 背题模式 · 正确答案：${q.answerDisplay}</div>`;
        }

        html += `<div class="nav">
            <button class="nav-btn" id="prevBtn">◀ 上一题</button>
            <button class="nav-btn" id="nextBtn">下一题 ▶</button>
        </div>`;

        if (!isRecite) {
            html += `<button class="check-btn" id="checkBtn">✓ 核对答案</button>`;
        }
        html += `<div class="small">滑动切换题目 · 错题自动记录</div></div>`;
        root.innerHTML = html;

        const optsDiv = document.getElementById('optionsContainer');
        if (!optsDiv) return;

        if (q.type === 'multiple') {
            // 多选题：复选框
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                const letter = letters[idx];
                optsDiv.innerHTML += `<label class="opt">
                    <input type="checkbox" name="multiOpt" value="${letter}">
                    <span class="opt-prefix">${letter}.</span>
                    <span>${escapeHtml(opt)}</span>
                </label>`;
            });
        } else {
            // 判断题：单选
            optsDiv.innerHTML = `
                <label class="opt"><input type="radio" name="judgeOpt" value="正确"> <span class="opt-prefix">✓</span><span>正确</span></label>
                <label class="opt"><input type="radio" name="judgeOpt" value="错误"> <span class="opt-prefix">✗</span><span>错误</span></label>
            `;
        }

        // 事件绑定
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentIndex > 0) currentIndex--;
            else { alert('已是第一题'); return; }
            lastResult = null;
            saveProgress();
            render();
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if (currentIndex + 1 < currentQuestions.length) currentIndex++;
            else { alert('已是最后一题'); return; }
            lastResult = null;
            saveProgress();
            render();
        });

        if (!isRecite) {
            const checkBtn = document.getElementById('checkBtn');
            if (checkBtn) {
                checkBtn.onclick = () => {
                    let selected = null;
                    if (q.type === 'multiple') {
                        const checked = [...document.querySelectorAll('input[name="multiOpt"]:checked')].map(cb => cb.value);
                        if (checked.length === 0) {
                            alert('请至少选择一个选项');
                            return;
                        }
                        selected = checked;
                    } else {
                        const radio = document.querySelector('input[name="judgeOpt"]:checked');
                        if (!radio) {
                            alert('请选择正确或错误');
                            return;
                        }
                        selected = radio.value;
                    }
                    const result = checkAnswer(selected, q);
                    lastResult = result;
                    render();
                };
            }
        }

        // 模式切换
        document.querySelectorAll('[data-mode]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const mode = e.currentTarget.getAttribute('data-mode');
                if (mode === 'wrongOnly') {
                    const wrongCount = allQuestions.filter(qq => wrongIds.has(qq.id)).length;
                    if (wrongCount === 0) {
                        alert('错题本暂无题目，请先在刷题模式下积累错题');
                        return;
                    }
                }
                currentMode = mode;
                currentQuestions = getCurrentQuestions();
                if (currentIndex >= currentQuestions.length) currentIndex = Math.max(0, currentQuestions.length - 1);
                if (currentIndex < 0 && currentQuestions.length) currentIndex = 0;
                lastResult = null;
                saveProgress();
                render();
            });
        });
    }

    loadProgress();
    render();
</script>
</body>
</html>
